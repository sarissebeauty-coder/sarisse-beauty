<!DOCTYPE html>
    <html lang="es">
        <head>
        <meta charset="UTF-8">
            <title>Rubores</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #222;
            color: white;
            margin: 0;
        }

        .contenedor {
            padding: 20px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            opacity: 0;
            transform: translateY(20px);
            animation: aparecer 0.6s forwards;
        }

        .item:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.2);
        }

        .item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .item:hover img {
            transform: scale(1.05);
        }

        .descripcion {
            padding: 10px;
            font-size: 14px;
        }

        .boton {
            margin: 10px;
            padding: 8px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .boton:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .item:nth-child(1){animation-delay:0.1s;}
        .item:nth-child(2){animation-delay:0.2s;}
        .item:nth-child(3){animation-delay:0.3s;}
        .item:nth-child(4){animation-delay:0.4s;}
        .item:nth-child(5){animation-delay:0.5s;}
        .item:nth-child(6){animation-delay:0.6s;}
        .item:nth-child(7){animation-delay:0.7s;}
        .item:nth-child(8){animation-delay:0.8s;}
        .item:nth-child(9){animation-delay:0.9s;}
        .item:nth-child(10){animation-delay:1s;}
        .item:nth-child(11){animation-delay:1.1s;}
        .item:nth-child(12){animation-delay:1.2s;}
    </style>
</head>
