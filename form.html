<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sarissebeauty</title>
    <style>
        /* --- Estilos Generales --- */
        body {
            font-family: 'Georgia', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* --- Estilos del Encabezado (Header) --- */
        header {
            /* IMPORTANTE: Imagen de Fondo */
            /* Reemplaza la URL de abajo con la imagen real de tu escuela */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('bannerform.jpg'); 
            
            background-size: cover; /* La imagen cubre todo el espacio */
            background-position: center; /* Centrar la imagen */
            color: white;
            padding: 100px 20px; /* Espaciado arriba y abajo */
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* Sombra para que se lea mejor el texto */
        }

        /* --- Estilos del Contenedor Principal --- */
        .container {
            max-width: 600px; /* Ancho máximo del formulario */
            margin: -50px auto 50px; /* Levanta el formulario sobre el encabezado */
            background: rgb(228, 217, 217);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative; /* Necesario para el margin-top negativo */
        }

        h2 {
            text-align: center;
            color: #8496aa; /* Color institucional (ejemplo) */
            margin-bottom: 30px;
        }

        /* --- Estilos del Formulario --- */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Importante para que el padding no afecte el ancho */
            font-size: 16px;
        }

        input:focus,
        textarea:focus {
            border-color: #000000;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 74, 153, 0.2);
        }

        /* Tres renglones para sugerencias */
        textarea {
            resize: vertical; /* Permite al usuario estirarlo solo hacia abajo */
        }

        /* Estilos del Botón --- */
        .btn-enviar {
            background-color: rgb(200, 236, 224);
            color: rgb(0, 0, 0);
            border: 1px solid rgb(255, 255, 255);
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-enviar:hover {
            background-color: rgb(228, 106, 106);
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>

    <header>
        <h1>Sarisse</h1>
    </header>

    <div class="container">
        <h2><marquee>Registrate</marquee></h2>
        
        <form action="https://formspree.io/f/TU_ID_DE_FORMSPREE" method="POST">
            
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Denisse Osalde" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej. 9841304135" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="Ej. sarita7@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="sugerencias">Sugerencias o Comentarios:</label>
                <textarea id="sugerencias" name="sugerencias" rows="3" placeholder="Escribe aquí tus sugerencias..." required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Datos</button>

        </form>
    </div>

</body>
</html>
