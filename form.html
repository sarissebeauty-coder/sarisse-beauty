<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sarissebeauty</title>
    <style>
        body {
            font-family: 'Georgia', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('bannerform.jpg'); 
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 600px;
            margin: -50px auto 50px;
            background: rgb(228, 217, 217);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #8496aa;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            border-color: #000000;
            outline: none;
        }

        .btn-enviar {
            background-color: rgb(200, 236, 224);
            color: rgb(0, 0, 0);
            border: 1px solid rgb(255, 255, 255);
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-enviar:hover {
            background-color: rgb(228, 106, 106);
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>

<header>
    <h1>Sarisse</h1>
</header>

<div class="container">
    <h2><marquee>Registrate</marquee></h2>
    
    <form action="https://formspree.io/f/TU_ID_DE_FORMSPREE" method="POST">
        
        <!--  REDIRECCIÓN -->
        <input type="hidden" name="_redirect" value="index.html">

        <div class="form-group">
            <label>Nombre Completo:</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Teléfono:</label>
            <input type="tel" name="telefono" required>
        </div>

        <div class="form-group">
            <label>Correo Electrónico:</label>
            <input type="email" name="correo" required>
        </div>

        <div class="form-group">
            <label>Sugerencias o Comentarios:</label>
            <textarea name="sugerencias" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar Datos</button>

    </form>
</div>

</body>
</html>
